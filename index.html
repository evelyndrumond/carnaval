<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎉 Votação – Carnaval de Salvador 2027</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0720;
  --card: #1C0F3D;
  --card2: #251450;
  --border: #3D2680;
  --text: #F0EAFF;
  --muted: #A78BFA;
  --gold: #FCD34D;
  --gold2: #B45309;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 15% 5%, rgba(139,92,246,.35) 0%, transparent 45%),
    radial-gradient(ellipse at 85% 90%, rgba(13,148,136,.25) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 50%, rgba(220,38,38,.1) 0%, transparent 60%);
}

/* CONFETTI */
.cf { position:fixed; width:9px; height:13px; top:-20px; opacity:0; border-radius:2px;
  animation: cffall linear forwards; z-index:999; pointer-events:none; }
@keyframes cffall {
  0%  { opacity:1; transform:translateY(0) rotate(0deg); }
  100%{ opacity:0; transform:translateY(105vh) rotate(640deg); }
}

/* HEADER */
header { position:relative; z-index:1; text-align:center; padding:44px 20px 28px; }
.flag { display:flex; justify-content:center; gap:5px; margin-bottom:14px; }
.flag span { width:26px; height:9px; border-radius:3px; }
header h1 {
  font-family:'Baloo 2',cursive; font-size:clamp(26px,5.5vw,50px); font-weight:800;
  background:linear-gradient(135deg,#FCD34D,#F472B6,#A78BFA,#34D399);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  line-height:1.15; margin-bottom:8px;
}
.htag {
  display:inline-block; background:rgba(252,211,77,.12); border:1px solid rgba(252,211,77,.3);
  color:var(--gold); font-size:12px; font-weight:600; padding:3px 14px; border-radius:99px;
  margin-bottom:12px; letter-spacing:.5px;
}
header p { font-size:15px; color:var(--muted); max-width:460px; margin:0 auto; line-height:1.6; }
.total-badge {
  display:inline-block; background:rgba(167,139,250,.15); border:1px solid rgba(167,139,250,.3);
  color:var(--muted); font-size:12px; padding:2px 12px; border-radius:99px; margin-top:10px;
}

/* CONTROLS */
.controls {
  position:sticky; top:0; z-index:50;
  background:rgba(15,7,32,.92); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:14px 20px; display:flex; flex-wrap:wrap; gap:12px; align-items:center;
}
.name-wrap { display:flex; gap:8px; flex:1; min-width:200px; }
.name-wrap input {
  flex:1; padding:10px 14px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--card); color:var(--text); font-size:14px; font-family:'Inter',sans-serif;
  outline:none; transition:border-color .2s; min-width:0;
}
.name-wrap input:focus { border-color:var(--gold); }
.name-wrap input::placeholder { color:var(--muted); opacity:.5; }
.filters { display:flex; gap:6px; flex-wrap:wrap; }
.ftab {
  padding:8px 14px; border-radius:8px; border:1.5px solid var(--border);
  background:transparent; color:var(--muted); font-size:12px; font-weight:600;
  cursor:pointer; transition:all .2s; font-family:'Inter',sans-serif; letter-spacing:.3px;
}
.ftab:hover { border-color:var(--gold); color:var(--gold); }
.ftab.active { background:rgba(252,211,77,.15); border-color:var(--gold); color:var(--gold); }
.count-label { font-size:11px; color:var(--muted); white-space:nowrap; align-self:center; }

/* SECTION HEADER */
.group-section { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:28px 20px 0; }
.group-section.hidden { display:none; }
.gsec-title {
  font-family:'Baloo 2',cursive; font-size:17px; font-weight:700;
  color:var(--text); margin-bottom:4px; display:flex; align-items:center; gap:10px;
}
.gsec-sub { font-size:12px; color:var(--muted); margin-bottom:16px; }
.gcnt { font-size:11px; padding:2px 10px; border-radius:99px; font-weight:600; }
.g1a .gcnt { background:rgba(192,132,252,.2); color:#C084FC; }
.g1b .gcnt { background:rgba(52,211,153,.2); color:#34D399; }
.g2a .gcnt { background:rgba(252,165,165,.2); color:#FCA5A5; }
.g2b .gcnt { background:rgba(252,211,77,.2); color:var(--gold); }

/* CARD GRID */
.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(210px, 1fr));
  gap:12px; margin-bottom:32px;
}

/* CARD */
.opt-card {
  background:var(--card); border:1.5px solid var(--border); border-radius:14px;
  padding:14px 14px 12px; display:flex; flex-direction:column; gap:10px;
  transition:transform .18s, border-color .18s, box-shadow .18s;
  position:relative; overflow:hidden; cursor:default;
}
.opt-card:hover { transform:translateY(-3px); }
.opt-card.voted { border-color:var(--gold); box-shadow:0 0 20px rgba(252,211,77,.2); }
.opt-card.winner { border-color:#34D399; box-shadow:0 0 28px rgba(52,211,153,.25); }
.opt-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:14px 14px 0 0;
}
.g1a .opt-card::before { background:linear-gradient(90deg,#C084FC,#7B2FBE); }
.g1b .opt-card::before { background:linear-gradient(90deg,#34D399,#0D9488); }
.g2a .opt-card::before { background:linear-gradient(90deg,#FCA5A5,#DC2626); }
.g2b .opt-card::before { background:linear-gradient(90deg,#FCD34D,#D97706); }

.card-id { font-size:10px; font-weight:700; color:var(--muted); letter-spacing:.5px; }
.crown { position:absolute; top:6px; right:10px; font-size:18px; display:none;
  animation:bounce .7s infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-5px)} }
.opt-card.winner .crown { display:block; }

.schedule { display:flex; flex-direction:column; gap:5px; }
.srow {
  display:flex; align-items:baseline; gap:7px;
  padding:5px 8px; border-radius:7px; background:rgba(255,255,255,.03);
}
.sday { font-size:9px; font-weight:700; color:var(--muted); min-width:24px; text-transform:uppercase; letter-spacing:.5px; padding-top:1px; }
.sinfo { flex:1; min-width:0; }
.sevent { font-size:12px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sartist { font-size:10px; color:var(--muted); }
.pill {
  display:inline-block; font-size:8px; font-weight:800; padding:1px 5px;
  border-radius:4px; margin-left:3px; vertical-align:middle; letter-spacing:.3px;
}
.pill-ivete  { background:rgba(192,132,252,.25); color:#E9D5FF; }
.pill-bell   { background:rgba(52,211,153,.2);   color:#A7F3D0; }
.pill-vip    { background:rgba(252,211,77,.2);    color:#FDE68A; }

/* vote area */
.varea { display:flex; flex-direction:column; gap:6px; margin-top:2px; }
.vbar-wrap { background:rgba(255,255,255,.06); border-radius:6px; height:5px; overflow:hidden; }
.vbar { height:100%; border-radius:6px; transition:width .45s ease; width:0%; }
.g1a .vbar { background:linear-gradient(90deg,#C084FC,#7B2FBE); }
.g1b .vbar { background:linear-gradient(90deg,#34D399,#0D9488); }
.g2a .vbar { background:linear-gradient(90deg,#FCA5A5,#DC2626); }
.g2b .vbar { background:linear-gradient(90deg,#FCD34D,#D97706); }
.vmeta { display:flex; justify-content:space-between; align-items:center; }
.vcount { font-family:'Baloo 2',cursive; font-size:18px; font-weight:800; color:var(--text); }
.vnames { font-size:10px; color:var(--muted); font-style:italic; min-height:14px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.btn-vote {
  width:100%; padding:8px; border-radius:9px; border:none;
  font-family:'Baloo 2',cursive; font-size:14px; font-weight:800;
  cursor:pointer; transition:transform .14s, opacity .14s; letter-spacing:.3px;
}
.btn-vote:hover { transform:scale(1.04); }
.btn-vote:active { transform:scale(.96); }
.g1a .btn-vote { background:linear-gradient(135deg,#C084FC,#7B2FBE); color:white; }
.g1b .btn-vote { background:linear-gradient(135deg,#34D399,#0D9488); color:white; }
.g2a .btn-vote { background:linear-gradient(135deg,#FCA5A5,#DC2626); color:white; }
.g2b .btn-vote { background:linear-gradient(135deg,#FCD34D,#B45309); color:#1A0A2E; }

/* LEADERBOARD */
.leaderboard {
  position:relative; z-index:1; max-width:600px; margin:20px auto 60px; padding:0 20px;
}
.lb-box {
  background:var(--card); border:1.5px solid var(--border); border-radius:18px; padding:22px;
}
.lb-title {
  font-family:'Baloo 2',cursive; font-size:20px; font-weight:800;
  text-align:center; color:var(--gold); margin-bottom:16px;
}
.lb-empty { text-align:center; color:var(--muted); font-size:13px; padding:10px; }
.lb-row {
  display:flex; align-items:center; gap:12px; padding:9px 0;
  border-bottom:1px solid rgba(255,255,255,.05);
}
.lb-row:last-child { border-bottom:none; }
.lb-rank {
  font-family:'Baloo 2',cursive; font-size:20px; font-weight:800;
  min-width:28px; text-align:center;
}
.lb-info { flex:1; min-width:0; }
.lb-sched { font-size:12px; color:var(--text); font-weight:500; }
.lb-voters { font-size:11px; color:var(--muted); margin-top:2px; font-style:italic;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.lb-cnt {
  font-family:'Baloo 2',cursive; font-size:22px; font-weight:800;
  color:var(--gold); min-width:32px; text-align:right;
}
.lb-gbadge {
  font-size:10px; font-weight:700; padding:2px 7px; border-radius:6px;
}
.bg1a { background:rgba(192,132,252,.2); color:#C084FC; }
.bg1b { background:rgba(52,211,153,.2);  color:#34D399; }
.bg2a { background:rgba(252,165,165,.2); color:#FCA5A5; }
.bg2b { background:rgba(252,211,77,.2);  color:var(--gold); }

/* TOAST */
.toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(70px);
  background:rgba(252,211,77,.12); border:1px solid rgba(252,211,77,.35);
  color:var(--gold); padding:10px 22px; border-radius:99px; font-size:14px;
  font-weight:600; z-index:200; transition:transform .35s ease;
  pointer-events:none; backdrop-filter:blur(8px);
}
.toast.show { transform:translateX(-50%) translateY(0); }

/* RESET */
.reset-wrap { position:relative; z-index:1; text-align:center; padding-bottom:40px; }
.btn-reset {
  background:none; border:1px solid rgba(255,255,255,.12); color:var(--muted);
  padding:7px 18px; border-radius:99px; font-size:12px; cursor:pointer;
  font-family:'Inter',sans-serif; transition:border-color .2s, color .2s;
}
.btn-reset:hover { border-color:var(--gold); color:var(--gold); }

@media(max-width:500px){
  .card-grid { grid-template-columns:1fr 1fr; gap:8px; }
  .controls { flex-direction:column; align-items:stretch; }
  .filters { justify-content:center; }
}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header>
  <div class="flag">
    <span style="background:#009c3b"></span><span style="background:#FEDF00"></span>
    <span style="background:#002776"></span><span style="background:#FEDF00"></span>
    <span style="background:#009c3b"></span>
  </div>
  <div class="htag">Carnaval de Salvador 2027 · Circuito Barra-Ondina</div>
  <h1>Qual a programação<br>perfeita? 🎊</h1>
  <p>Todas as combinações possíveis. Cada amigo vota na favorita!</p>
  <div class="total-badge" id="total-badge">90 opções disponíveis</div>
</header>

<div class="controls">
  <div class="name-wrap">
    <input type="text" id="voter-name" placeholder="Seu nome aqui…" autocomplete="off" maxlength="30">
  </div>
  <div class="filters">
    <button class="ftab active" onclick="filter('all')">Todos</button>
    <button class="ftab" onclick="filter('1a')">1A · Ivete sáb</button>
    <button class="ftab" onclick="filter('1b')">1B · Ivete seg</button>
    <button class="ftab" onclick="filter('2a')">2A · Camaleão dom</button>
    <button class="ftab" onclick="filter('2b')">2B · Camaleão seg</button>
  </div>
  <span class="count-label" id="count-showing"></span>
</div>

<div id="sections"></div>

<div class="leaderboard">
  <div class="lb-box">
    <div class="lb-title">🏆 Ranking da galera</div>
    <div id="leaderboard"><div class="lb-empty">Nenhum voto ainda — bora decidir! 🎉</div></div>
  </div>
</div>

<div class="reset-wrap">
  <button class="btn-reset" onclick="resetAll()">🔄 Zerar votação</button>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const CORUJA     = { name:'Coruja',          artist:'Ivete Sangalo',  type:'ivete'    };
const CAM_BELL   = { name:'Camarote Salvador',artist:'Bell Marques',  type:'camarote' };
const CAMALEAO   = { name:'Camaleão',         artist:'Bell Marques',  type:'bell'     };
const CAM_IVETE  = { name:'Camarote Salvador',artist:'Ivete Sangalo', type:'camarote' };

const SAB_OPTS = [
  { name:'Coruja',        artist:'Ivete Sangalo',  type:'ivete'  },
  { name:'Vumbora',       artist:'Bell Marques',   type:'bell'   },
  { name:'Eva',           artist:'Banda Eva',      type:'other'  },
  { name:'Bloco do Nana', artist:'Léo Santana',    type:'other'  },
  { name:'Fissura',       artist:'Tomate',         type:'other'  },
  { name:'Timbalada',     artist:'Carlinhos Brown',type:'other'  },
];
const DOM_OPTS = [
  { name:'Camaleão',        artist:'Bell Marques',   type:'bell'  },
  { name:'Me Abraça',       artist:'Durval Lelys',   type:'other' },
  { name:'Crocodilo',       artist:'Daniela Mercury',type:'other' },
  { name:'Bloco da Torcida',artist:'Xanddy Harmonia',type:'other'},
];
const SEG_OPTS = [
  { name:'Coruja',          artist:'Ivete Sangalo',  type:'ivete' },
  { name:'Camaleão',        artist:'Bell Marques',   type:'bell'  },
  { name:'Me Abraça',       artist:'Durval Lelys',   type:'other' },
  { name:'Crocodilo',       artist:'Daniela Mercury',type:'other' },
  { name:'Vem Comigo',      artist:'Carla Cristina', type:'other' },
  { name:'Bloco da Segunda',artist:'Xanddy Harmonia',type:'other'},
];
const TER_OPTS = [
  { name:'Camaleão', artist:'Bell Marques',   type:'bell'  },
  { name:'Largadinho',artist:'Claudia Leitte',type:'other' },
  { name:'Praieiro', artist:'Jammil',         type:'other' },
];

// ── GENERATE COMBINATIONS ────────────────────────────────────────────
const combos = [];
let idx = 0;

// 1A: Sáb=Coruja fixo, Dom=Camarote Bell fixo, Seg+Ter livres
SEG_OPTS.forEach(seg => {
  TER_OPTS.forEach(ter => {
    combos.push({ id: idx++, group:'1a', sab:CORUJA, dom:CAM_BELL, seg, ter });
  });
});

// 1B: Dom=Camarote Bell fixo, Seg=Coruja fixo, Sáb+Ter livres
SAB_OPTS.filter(b => b.name !== 'Coruja').forEach(sab => {
  TER_OPTS.forEach(ter => {
    combos.push({ id: idx++, group:'1b', sab, dom:CAM_BELL, seg:CORUJA, ter });
  });
});

// 2A: Dom=Camaleão fixo, Ter=Camarote Ivete fixo, Sáb+Seg livres
SAB_OPTS.forEach(sab => {
  SEG_OPTS.forEach(seg => {
    combos.push({ id: idx++, group:'2a', sab, dom:CAMALEAO, seg, ter:CAM_IVETE });
  });
});

// 2B: Seg=Camaleão fixo, Ter=Camarote Ivete fixo, Sáb+Dom livres
SAB_OPTS.forEach(sab => {
  DOM_OPTS.forEach(dom => {
    combos.push({ id: idx++, group:'2b', sab, dom, seg:CAMALEAO, ter:CAM_IVETE });
  });
});

// ── STATE ────────────────────────────────────────────────────────────
let votes = {}; // { voterName: comboId }
let currentFilter = 'all';

// ── RENDER ───────────────────────────────────────────────────────────
const GROUPS = {
  '1a': { label:'1A', title:'Camarote dom (Bell) · Ivete no sábado', color:'g1a' },
  '1b': { label:'1B', title:'Camarote dom (Bell) · Ivete na segunda', color:'g1b' },
  '2a': { label:'2A', title:'Camarote ter (Ivete) · Camaleão no domingo', color:'g2a' },
  '2b': { label:'2B', title:'Camarote ter (Ivete) · Camaleão na segunda', color:'g2b' },
};
const CONFETTI_COLORS = ['#FCD34D','#C084FC','#34D399','#FCA5A5','#60A5FA','#F472B6','#FB923C'];

function pillHtml(type) {
  if (type === 'ivete')   return '<span class="pill pill-ivete">IVETE</span>';
  if (type === 'bell')    return '<span class="pill pill-bell">BELL</span>';
  if (type === 'camarote')return '<span class="pill pill-vip">VIP</span>';
  return '';
}

function cardHtml(c) {
  const g = GROUPS[c.group];
  const days = [
    { label:'Sáb', e:c.sab },
    { label:'Dom', e:c.dom },
    { label:'Seg', e:c.seg },
    { label:'Ter', e:c.ter },
  ];
  const rowsHtml = days.map(d =>
    `<div class="srow">
      <span class="sday">${d.label}</span>
      <div class="sinfo">
        <div class="sevent">${esc(d.e.name)}${pillHtml(d.e.type)}</div>
        <div class="sartist">${esc(d.e.artist)}</div>
      </div>
    </div>`
  ).join('');

  return `
  <div class="opt-card" id="card-${c.id}">
    <div class="crown">👑</div>
    <div class="card-id">${g.label} · #${String(c.id+1).padStart(2,'0')}</div>
    <div class="schedule">${rowsHtml}</div>
    <div class="varea">
      <div class="vmeta">
        <span style="font-size:10px;color:var(--muted)">votos</span>
        <span class="vcount" id="vc-${c.id}">0</span>
      </div>
      <div class="vbar-wrap"><div class="vbar" id="vb-${c.id}"></div></div>
      <div class="vnames" id="vn-${c.id}">—</div>
      <button class="btn-vote" onclick="vote(${c.id})">Votar 🗳️</button>
    </div>
  </div>`;
}

function renderSections() {
  const container = document.getElementById('sections');
  let html = '';
  const groups = ['1a','1b','2a','2b'];

  groups.forEach(gk => {
    const g = GROUPS[gk];
    const gcombos = combos.filter(c => c.group === gk);
    const hidden = currentFilter !== 'all' && currentFilter !== gk ? 'hidden' : '';
    html += `
    <div class="group-section ${g.color} ${hidden}" id="sec-${gk}">
      <div class="gsec-title">
        <span>${gk === '1a' ? '💜' : gk === '1b' ? '💚' : gk === '2a' ? '❤️' : '💛'}</span>
        ${esc(g.title)}
        <span class="gcnt">${gcombos.length} opções</span>
      </div>
      <div class="gsec-sub">Dias fixos destacados · dias abertos combinam entre si</div>
      <div class="card-grid" id="grid-${gk}">
        ${gcombos.map(cardHtml).join('')}
      </div>
    </div>`;
  });
  container.innerHTML = html;
  updateCountLabel();
}

function updateCountLabel() {
  const visible = currentFilter === 'all'
    ? combos.length
    : combos.filter(c => c.group === currentFilter).length;
  document.getElementById('count-showing').textContent =
    `${visible} ${visible === 1 ? 'opção' : 'opções'} visíveis`;
}

// ── VOTE ────────────────────────────────────────────────────────────
function vote(comboId) {
  const nameEl = document.getElementById('voter-name');
  const name = nameEl.value.trim();
  if (!name) {
    nameEl.focus();
    nameEl.style.borderColor = '#EF4444';
    setTimeout(() => nameEl.style.borderColor = '', 1200);
    toast('⚠️ Coloca seu nome primeiro!');
    return;
  }
  votes[name] = comboId;
  confetti();
  toast('🎉 Voto registrado!');
  updateAllCards();
  updateLeaderboard();
}

function updateAllCards() {
  const totals = {};
  combos.forEach(c => totals[c.id] = 0);
  Object.values(votes).forEach(id => { if (totals[id] !== undefined) totals[id]++; });

  const totalVotes = Object.values(totals).reduce((a,b)=>a+b,0);
  const maxVotes = Math.max(...Object.values(totals));
  const myVote = votes[document.getElementById('voter-name').value.trim()];

  combos.forEach(c => {
    const n = totals[c.id];
    const el = id => document.getElementById(id);

    const vcEl = el(`vc-${c.id}`);
    const vbEl = el(`vb-${c.id}`);
    const vnEl = el(`vn-${c.id}`);
    const card = el(`card-${c.id}`);
    if (!vcEl) return;

    vcEl.textContent = n;
    vbEl.style.width = totalVotes > 0 ? (n/totalVotes*100).toFixed(1)+'%' : '0%';

    const names = Object.entries(votes).filter(([,v])=>v===c.id).map(([k])=>k);
    vnEl.textContent = names.length ? names.join(', ') : '—';

    card.classList.toggle('winner', n === maxVotes && n > 0);
    card.classList.toggle('voted', myVote === c.id);
  });
}

function updateLeaderboard() {
  const totals = {};
  combos.forEach(c => totals[c.id] = 0);
  Object.values(votes).forEach(id => { if (totals[id] !== undefined) totals[id]++; });

  const ranked = combos
    .map(c => ({ ...c, n: totals[c.id] }))
    .filter(c => c.n > 0)
    .sort((a,b) => b.n - a.n)
    .slice(0, 8);

  const medals = ['🥇','🥈','🥉'];
  const lbEl = document.getElementById('leaderboard');

  if (ranked.length === 0) {
    lbEl.innerHTML = '<div class="lb-empty">Nenhum voto ainda — bora decidir! 🎉</div>';
    return;
  }

  const gbCls = { '1a':'bg1a','1b':'bg1b','2a':'bg2a','2b':'bg2b' };
  lbEl.innerHTML = ranked.map((c,i) => {
    const names = Object.entries(votes).filter(([,v])=>v===c.id).map(([k])=>k);
    const sched = `${c.sab.name} · ${c.dom.name} · ${c.seg.name} · ${c.ter.name}`;
    const rank = i < 3 ? medals[i] : `<span style="font-size:14px;color:var(--muted)">${i+1}º</span>`;
    return `
    <div class="lb-row">
      <span class="lb-rank">${rank}</span>
      <div class="lb-info">
        <div class="lb-sched">
          <span class="lb-gbadge ${gbCls[c.group]}">${GROUPS[c.group].label}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:6px">#${c.id+1}</span>
          <span style="font-size:12px;margin-left:6px">${esc(sched)}</span>
        </div>
        <div class="lb-voters">${names.join(', ')}</div>
      </div>
      <span class="lb-cnt">${c.n}</span>
    </div>`;
  }).join('');
}

// ── FILTER ──────────────────────────────────────────────────────────
function filter(gk) {
  currentFilter = gk;
  document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  ['1a','1b','2a','2b'].forEach(g => {
    const sec = document.getElementById('sec-'+g);
    if (sec) sec.classList.toggle('hidden', gk !== 'all' && gk !== g);
  });
  updateCountLabel();
}

// ── UTILS ───────────────────────────────────────────────────────────
function resetAll() {
  if (Object.keys(votes).length === 0) return;
  if (!confirm('Zerar todos os votos?')) return;
  votes = {};
  updateAllCards();
  updateLeaderboard();
}
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}
function confetti() {
  for (let i = 0; i < 50; i++) {
    const el = document.createElement('div');
    el.className = 'cf';
    el.style.cssText = `left:${Math.random()*100}vw;background:${CONFETTI_COLORS[Math.floor(Math.random()*7)]};
      animation-duration:${1.3+Math.random()*1.9}s;animation-delay:${Math.random()*.5}s;
      width:${7+Math.random()*8}px;height:${9+Math.random()*11}px;
      border-radius:${Math.random()>.5?'50%':'2px'}`;
    document.body.appendChild(el);
    el.addEventListener('animationend', ()=>el.remove());
  }
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ────────────────────────────────────────────────────────────
renderSections();
document.getElementById('total-badge').textContent = combos.length + ' combinações possíveis';
</script>
</body>
